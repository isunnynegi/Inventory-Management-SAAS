name: Build & Release

on:
  push:
    branches: [main]

# Prevent concurrent builds colliding on version bump
concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    # Skip the version-bump commit itself to avoid a loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the version-bump push triggers Pages/other workflows if needed.
          # GITHUB_TOKEN is fine if you don't need that.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Node setup ──────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Bump patch version ──────────────────────────────────────────────────
      - name: Bump patch version
        id: version
        shell: bash
        working-directory: frontend
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit & push version bump
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json frontend/package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push origin main

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install backend dependencies (production)
        working-directory: backend
        run: npm ci --omit=dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── MongoDB Windows binary ───────────────────────────────────────────────
      # mongod.exe is bundled into the installer but not committed to git (too large).
      # We download the Community Server ZIP and extract just the binary.
      - name: Download & extract mongod.exe
        shell: pwsh
        run: |
          $ver = "7.0.21"
          $url = "https://fastdl.mongodb.org/windows/mongodb-windows-x86_64-$ver.zip"
          Write-Host "Downloading MongoDB $ver …"
          Invoke-WebRequest -Uri $url -OutFile "mongodb.zip" -TimeoutSec 600
          Expand-Archive -Path "mongodb.zip" -DestinationPath "mongodb-tmp"
          $exe = Get-ChildItem -Path "mongodb-tmp" -Recurse -Filter "mongod.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "frontend\resources\mongod.exe"
          Remove-Item "mongodb.zip", "mongodb-tmp" -Recurse -Force
          Write-Host "mongod.exe placed at frontend\resources\mongod.exe"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build Vite frontend (electron mode)
        working-directory: frontend
        run: npm run build -- --mode electron

      - name: Build Electron installer
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish never

      # ── Release ──────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: StockKart v${{ steps.version.outputs.version }}
          body: |
            ## StockKart Desktop v${{ steps.version.outputs.version }}

            ### Install
            Download `StockKart-Setup-${{ steps.version.outputs.version }}.exe` below and run it.

            ### What's included
            - Bundled MongoDB (no separate install needed)
            - Offline-first: works without internet after first setup
            - Auto-update: the app checks for new releases on launch
          files: |
            frontend/release/**/*.exe
            frontend/release/**/*.exe.blockmap
            frontend/release/latest.yml
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
