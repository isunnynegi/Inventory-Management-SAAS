version: "3.9"
services:
  backend:
    build: { context: ./backend, dockerfile: Dockerfile.dev }
    container_name: inv_backend
    restart: unless-stopped
    ports: ["5000:5000"]
    env_file: ./backend/.env
    volumes: ["./backend:/app", "/app/node_modules"]
    depends_on:
      mongo: { condition: service_healthy }
    networks: [inv_net]

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile.dev }
    container_name: inv_frontend
    restart: unless-stopped
    ports: ["5173:5173"]
    env_file: ./frontend/.env
    volumes: ["./frontend:/app", "/app/node_modules"]
    networks: [inv_net]

  mongo:
    image: mongo:7.0
    container_name: inv_mongo
    restart: unless-stopped
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: inventory_saas
    volumes: [mongo_data:/data/db]
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [inv_net]

volumes:
  mongo_data:

networks:
  inv_net:
    driver: bridge
